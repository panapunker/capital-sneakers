{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">
📋 Historial de Pedidos
</h2>

<form method="GET" class="row mb-4">

    <div class="col-md-4">

        <label>Desde</label>

        <input
            type="date"
            name="inicio"
            class="form-control"
            value="{{ request.GET.inicio }}">

    </div>

    <div class="col-md-4">

        <label>Hasta</label>

        <input
            type="date"
            name="fin"
            class="form-control"
            value="{{ request.GET.fin }}">

    </div>

    <div class="col-md-4 d-flex align-items-end">

        <button
            type="submit"
            class="btn btn-dark">
            Filtrar
        </button>

    </div>

</form>

<table class="table table-striped">

    <thead>

        <tr>

            <th>Pedido</th>
            <th>Fecha</th>
            <th>Estado</th>
            <th>Detalle</th>

        </tr>

    </thead>

    <tbody>

        {% for pedido in pedidos %}

        <tr>

            <td>
                #{{ pedido.id }}
            </td>

            <td>
                {{ pedido.fecha|date:"d/m/Y H:i" }}
            </td>

            <td>
                {{ pedido.estado }}
            </td>

            <td>

                <a
                    href="{% url 'detalle_pedido' pedido.id %}"
                    class="btn btn-primary btn-sm">

                    Ver Pedido

                </a>

            </td>

        </tr>

        {% empty %}

        <tr>

            <td colspan="4">
                No hay pedidos registrados.
            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
