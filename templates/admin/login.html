{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Capital Sneakers Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    font-family:system-ui;
}

.login-card{
    width:420px;
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    font-size:28px;
    font-weight:700;
    color:#111827;
}

.logo p{
    color:#6b7280;
}

.btn-login{
    background:#111827;
    color:white;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
}

.btn-login:hover{
    background:#1f2937;
}

</style>

</head>

<body>

<div class="login-card">

    <div class="logo">
        <h1>👟 Capital Sneakers</h1>
        <p>Panel Administrativo</p>
    </div>

    {% if form.errors %}
        <div class="alert alert-danger">
            Usuario o contraseña incorrectos.
        </div>
    {% endif %}

    <form method="post">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">
                Usuario
            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">
                Contraseña
            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                required>

        </div>

        <input
            type="hidden"
            name="next"
            value="{{ next }}">

        <button
            type="submit"
            class="btn-login">
            Iniciar Sesión
        </button>

    </form>

</div>

</body>
</html>
