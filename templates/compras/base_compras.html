{% extends "base_admin.html" %}
{% load static %}

{% block extra_css %}
<style>
    .compras-header {
        background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        border-radius: 16px;
        padding: 24px 32px;
        margin-bottom: 28px;
        color: white;
    }
    .compras-header h2 {
        font-weight: 700;
        font-size: 1.6rem;
        margin: 0;
    }
    .compras-header p {
        margin: 4px 0 0;
        opacity: 0.75;
        font-size: 0.9rem;
    }
    .btn-primary-custom {
        background: linear-gradient(135deg, #e94560, #c73652);
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: 600;
        padding: 8px 20px;
        transition: all 0.3s ease;
    }
    .btn-primary-custom:hover {
        background: linear-gradient(135deg, #c73652, #a52d44);
        color: white;
        transform: translateY(-1px);
        box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
    }
    .table-card {
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        border: none;
    }
    .table thead th {
        background: #1a1a2e;
        color: white;
        font-weight: 600;
        border: none;
        padding: 14px 16px;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .table tbody tr {
        transition: background 0.2s ease;
    }
    .table tbody tr:hover {
        background: rgba(233, 69, 96, 0.05);
    }
    .table tbody td {
        padding: 12px 16px;
        vertical-align: middle;
        border-color: #f0f0f0;
    }
    .badge-pendiente {
        background: rgba(255, 193, 7, 0.15);
        color: #d39e00;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.78rem;
    }
    .badge-recibida {
        background: rgba(40, 199, 111, 0.15);
        color: #28c76f;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.78rem;
    }
    .badge-cancelada {
        background: rgba(234, 84, 85, 0.15);
        color: #ea5455;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.78rem;
    }
    .btn-accion {
        border-radius: 8px;
        padding: 4px 12px;
        font-size: 0.8rem;
        font-weight: 500;
        border: none;
        transition: all 0.2s ease;
    }
    .btn-editar {
        background: rgba(0, 123, 255, 0.1);
        color: #007bff;
    }
    .btn-editar:hover {
        background: #007bff;
        color: white;
    }
    .btn-eliminar {
        background: rgba(234, 84, 85, 0.1);
        color: #ea5455;
    }
    .btn-eliminar:hover {
        background: #ea5455;
        color: white;
    }
    .btn-ver {
        background: rgba(40, 199, 111, 0.1);
        color: #28c76f;
    }
    .btn-ver:hover {
        background: #28c76f;
        color: white;
    }
    .btn-confirmar {
        background: rgba(40, 199, 111, 0.1);
        color: #28c76f;
    }
    .btn-confirmar:hover {
        background: #28c76f;
        color: white;
    }
    .btn-cancelar-compra {
        background: rgba(234, 84, 85, 0.1);
        color: #ea5455;
    }
    .btn-cancelar-compra:hover {
        background: #ea5455;
        color: white;
    }
    .form-card {
        border-radius: 16px;
        border: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        padding: 32px;
    }
    .form-label {
        font-weight: 600;
        font-size: 0.85rem;
        color: #444;
        margin-bottom: 6px;
    }
    .form-control, .form-select {
        border-radius: 10px;
        border: 1.5px solid #e0e0e0;
        padding: 10px 14px;
        font-size: 0.9rem;
        transition: border-color 0.2s ease;
    }
    .form-control:focus, .form-select:focus {
        border-color: #e94560;
        box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
    }
    .confirmar-card {
        border-radius: 16px;
        border: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        padding: 40px;
        text-align: center;
        max-width: 500px;
        margin: 0 auto;
    }
    .icono-eliminar {
        font-size: 3rem;
        color: #ea5455;
        margin-bottom: 16px;
    }
    .icono-confirmar {
        font-size: 3rem;
        color: #28c76f;
        margin-bottom: 16px;
    }
    .metric-card {
        border-radius: 16px;
        border: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        padding: 20px 24px;
        transition: transform 0.2s ease;
    }
    .metric-card:hover {
        transform: translateY(-2px);
    }
    .metric-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.4rem;
    }
    .filtros-card {
        border-radius: 16px;
        border: none;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        padding: 20px 24px;
        margin-bottom: 24px;
    }
</style>
{% endblock %}

{% block content %}
{% block compras_content %}{% endblock %}
{% endblock %}
