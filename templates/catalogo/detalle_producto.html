{% extends 'base.html' %}

{% block content %}

<div class="row">

    <div class="col-md-5">

        {% if producto.imagen %}
        <img
            src="{{ producto.imagen.url }}"
            class="img-fluid rounded">
        {% endif %}

    </div>

    <div class="col-md-7">

        <h2>{{ producto.nombre }}</h2>

        <p>
            Marca: {{ producto.marca }}
        </p>

        <p>
            Referencia: {{ producto.referencia }}
        </p>

        <h3>
            ${{ producto.precio }}
        </h3>

        <hr>

<h4>Seleccione una talla</h4>

<form
method="POST"
action="{% url 'agregar_carrito' producto.id %}">
{% csrf_token %}

    <div class="mb-3">

        <select
            class="form-select"
            name="talla"
        >

            {% for item in inventario %}

            <option value="{{ item.id }}">
                Talla {{ item.talla.nombre }}
                - {{ item.cantidad }} disponibles
            </option>

            {% endfor %}

        </select>

    </div>

    <div class="mb-3">

        <label>
            Cantidad
        </label>

        <input
            type="number"
            name="cantidad"
            value="1"
            min="1"
            class="form-control"
        >

    </div>

    <button
        type="submit"
        class="btn btn-success"
    >
        Pedir
    </button>

</form>

{% endblock %}
