{% extends "catalogo/base_catalogo.html" %}

{% block catalogo_content %}
<div class="catalogo-header">
    <h2><i class="bi bi-trash me-2"></i>Eliminar {{ tipo }}</h2>
    <p>Esta acción no se puede deshacer</p>
</div>

<div class="confirmar-card">
    <div class="icono-eliminar">
        <i class="bi bi-exclamation-triangle-fill"></i>
    </div>
    <h4 class="fw-bold mb-2">¿Estás seguro?</h4>
    <p class="text-muted mb-4">
        Vas a eliminar <strong>{{ objeto }}</strong>. <br>
        Esta acción es permanente y no se puede revertir.
    </p>
    <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2 justify-content-center">
            <button type="submit" class="btn btn-danger" style="border-radius:10px; font-weight:600; padding: 8px 24px;">
                <i class="bi bi-trash me-1"></i> Sí, eliminar
            </button>
            <a href="{% url 'catalogo:lista_marcas' %}" class="btn btn-outline-secondary" style="border-radius:10px; font-weight:600; padding: 8px 24px;">
                <i class="bi bi-arrow-left me-1"></i> Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
