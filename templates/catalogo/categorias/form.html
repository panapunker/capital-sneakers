{% extends "catalogo/base_catalogo.html" %}

{% block catalogo_content %}
<div class="catalogo-header">
    <h2><i class="bi bi-tags me-2"></i>{{ titulo }}</h2>
    <p>Completa los datos de la categoría</p>
</div>

<div class="form-card">
    <form method="post">
        {% csrf_token %}

        <div class="mb-4">
            <label class="form-label">Nombre de la Categoría</label>
            {{ form.nombre }}
            {% if form.nombre.errors %}
                <div class="text-danger small mt-1">{{ form.nombre.errors.0 }}</div>
            {% endif %}
        </div>

        <div class="mb-4">
            <div class="form-check">
                {{ form.activo }}
                <label class="form-check-label fw-semibold" for="{{ form.activo.id_for_label }}">
                    Categoría activa
                </label>
            </div>
        </div>

        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-primary-custom">
                <i class="bi bi-check-lg me-1"></i> Guardar
            </button>
            <a href="{% url 'catalogo:lista_categorias' %}" class="btn btn-outline-secondary" style="border-radius:10px;">
                <i class="bi bi-arrow-left me-1"></i> Cancelar
            </a>
        </div>
    </form>
</div>
{% endblock %}
