<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Portal Clientes - Capital Sneakers Bodega</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f3f4f6;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-container{
    width:100%;
    max-width:420px;
    padding:20px;
}

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    max-width:120px;
    margin-bottom:10px;
}

.logo h2{
    font-weight:700;
    color:#111827;
    margin:0;
}

.card-login{
    background:white;
    border:none;
    border-radius:18px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.btn-login{
    background:#111827;
    color:white;
    border:none;
    height:48px;
    font-weight:600;
}

.btn-login:hover{
    background:#1f2937;
    color:white;
}

.footer{
    text-align:center;
    margin-top:20px;
    font-size:13px;
    color:#6b7280;
}

</style>

</head>

<body>

<div class="login-container">

    <div class="logo">

        <!-- Cambia esta ruta por tu logo -->
        <img src="/static/img/logo.png" alt="Logo">

        <h2>Capital Sneakers Bodega</h2>

    </div>

    <div class="card-login">

        <h4 class="text-center mb-4">
            Portal de Clientes
        </h4>

        {% if messages %}

            {% for message in messages %}

                <div class="alert alert-danger">

                    {{ message }}

                </div>

            {% endfor %}

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Usuario
                </label>

                <input
                type="text"
                name="username"
                class="form-control"
                required>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Contraseña
                </label>

                <input
                type="password"
                name="password"
                class="form-control"
                required>

            </div>

            <button
            type="submit"
            class="btn btn-login w-100">

                Ingresar

            </button>

        </form>

    </div>

    <div class="footer">

        © 2026 Nexxo 360<br>
        Todos los derechos reservados

    </div>

</div>

</body>
</html>
